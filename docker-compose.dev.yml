name: hub-dev

# Stack dev locale du Personal Data Hub.
# Lance Postgres + Redis + hub-core en local.
# Ollama tourne en natif sur le host (Windows) — pas en Docker pour profiter du GPU NVIDIA.

services:
  postgres:
    # Image avec pgvector intégré
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      # :? required → refuse de démarrer si la variable n'est pas dans .env
      # (évite de tomber sur un default insécure type "hubpass" oublié)
      POSTGRES_USER: ${POSTGRES_USER:?required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
      POSTGRES_DB: ${POSTGRES_DB:?required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      # Bind sur localhost uniquement (sinon expose Postgres au LAN)
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      # Bind sur localhost uniquement (Redis sans password = LAN-accessible sinon)
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  hub-core:
    # Construit depuis le repo hub-core en local (clone sibling: ../hub-core)
    build:
      context: ../hub-core
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-dev}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      # host.docker.internal résout vers le host Windows depuis le conteneur
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:14b-instruct}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text}
      # SECRET_KEY est validé au startup (refuse "changeme" et < 32 chars en prod)
      SECRET_KEY: ${SECRET_KEY:?required}
      # OAuth Google (Phase 3)
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
      GOOGLE_OAUTH_REDIRECT_URI: ${GOOGLE_OAUTH_REDIRECT_URI:-http://localhost:8000/v1/oauth/callback}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:8000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      # Bind 127.0.0.1 (pas 0.0.0.0) — hub-core dev ne doit jamais être accessible
      # depuis le LAN (pas d'auth en dev). En prod, Caddy reverse-proxy via réseau Docker.
      - "127.0.0.1:8000:8000"
    # Bind mount du code source pour avoir hot-reload en dev sans rebuild de l'image.
    # Permet de coder/itérer rapidement : on modifie un .py côté Windows, uvicorn redémarre tout seul.
    volumes:
      - ../hub-core/src:/app/src
      - ../hub-core/alembic:/app/alembic
      - ../hub-core/alembic.ini:/app/alembic.ini
    command: ["uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

  hub-ingest:
    # Worker d'ingestion. En dev on le demarre a la demande via :
    #   docker compose -f docker-compose.dev.yml run --rm hub-ingest
    # ce qui execute la pipeline run-once puis exit.
    build:
      context: ../hub-ingest
      dockerfile: Dockerfile
    profiles: ["ingest"]  # exclu du `compose up` par defaut, lance a la demande
    depends_on:
      hub-core:
        condition: service_healthy
    environment:
      RUN_MODE: ${INGEST_RUN_MODE:-run-once}
      HUB_API_BASE_URL: http://hub-core:8000
      RAW_EVENTS_DIR: /var/hub/raw_events
      INBOX_DIR: /var/hub/inbox
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      NTFY_TOPIC_URL: ${NTFY_TOPIC_URL:-}
    volumes:
      # Code source en bind mount pour iterer sans rebuild
      - ../hub-ingest/src:/app/src
      # Inbox locale (Marc depose ses CSV/PDF ici, c'est C:\hub\inbox cote Windows)
      - ../inbox:/var/hub/inbox
      # Raw events persistes (event sourcing) -> C:\hub\raw_events cote Windows
      - ../raw_events:/var/hub/raw_events

volumes:
  postgres_data:
  redis_data:
