# sops configuration — Personal Data Hub
#
# Tous les fichiers `secrets/*.enc.yaml` sont chiffrés avec la clé age publique
# de Marc. La clé privée vit uniquement sur les 2 clés USB physiques (cf. ADR-0006).
#
# Pour ajouter une nouvelle paire age (ex: si tu changes de PC ou ajoutes un
# membre du foyer), ajoute sa pubkey ci-dessous puis re-chiffre :
#   sops updatekeys secrets/postgres.enc.yaml

creation_rules:
  - path_regex: secrets/.*\.enc\.yaml$
    age: >-
      age1mtjlcmczkx680w62g9t3hgpxcvxk880hv4t58k8j9msvxlkhwfpslt2pl6
    # Format de la clé : `age1...` obtenu via `age-keygen -y ~/.age/hub.key`.
    # Si tu colles ici une vraie clé, c'est OK : la pubkey est volontairement
    # publique. Seule la privée doit rester secrète.
